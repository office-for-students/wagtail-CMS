parameters:
- name: dockerId
  type: string
- name: pythonVersion
  type: string
  default: '3.12'

steps:
- task: UsePythonVersion@0
  inputs:
    versionSpec: ${{ parameters.pythonVersion }}

- task: PythonScript@0
  displayName: 'Export project path'
  inputs:
    scriptSource: 'inline'
    script: |
      """Search all subdirectories for `CMS` module."""
      from glob import iglob
      from os import path
      # Python >= 3.5
      cms = next(iglob(path.join('**', 'CMS'), recursive=True), None)
      if not cms:
          raise SystemExit('Could not find the Django project')
      project_location = path.dirname(path.abspath(cms))
      print('Found Django project in', project_location)
      print('##vso[task.setvariable variable=projectRoot]{}'.format(project_location))

- script: |
    python -m pip install --upgrade pip setuptools wheel django
    pip install -r $(projectRoot)/requirements.txt
    pip install unittest-xml-reporting
  displayName: 'Install prerequisites'

- script: |
    pushd '$(projectRoot)'
    python manage.py test --testrunner xmlrunner.extra.djangotestrunner.XMLTestRunner --tag=azure --no-input
  condition: succeededOrFailed()
  displayName: 'Run tests'

- task: PublishTestResults@2
  condition: succeededOrFailed()
  inputs:
    testResultsFiles: "**/TEST-*.xml"
    testRunTitle: 'Python $(PYTHON_VERSION)'

- script: |
    pushd '$(projectRoot)'
    docker build -f ./deploy_files/Dockerfile -t ${{ parameters.dockerId }}.azurecr.io/$(imageName) .
    docker login -u ${{ parameters.dockerId }} -p $pswd ${{ parameters.dockerId }}.azurecr.io
    docker push ${{ parameters.dockerId }}.azurecr.io/$(imageName)
  env:
    pswd: $(dockerPassword)
  displayName: 'Build and push Docker image'
